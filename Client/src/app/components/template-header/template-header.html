<div class="header-wrapper">
  <div class="header-container" id="taBortTomContainer">
    <div class="header-text">
      <h1>{{ title }}</h1>
      <p>{{ subtitle }}</p>
    </div>
  </div>

  <div class="header-container">
    <app-search-bar (searchChange)="searchChange.emit($event)">
    </app-search-bar>
    <button class="template-header-btn"(click)="buttonClick.emit()">
      {{ buttonText }}
    </button>
  </div>
</div>
