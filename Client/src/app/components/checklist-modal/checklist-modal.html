<div class="overlay">

    <div class="modal">

        <div class="modal-header">

            <h2>Skapa Checklista</h2>

            <button class="close-btn" (click)="closeModal()">
                ✕
            </button>

        </div>

        <!-- Namn -->
        <div class="form-group">

            <label>Namn på listan</label>

            <input type="text" placeholder="T.ex. Grupparbete" />

        </div>

        <!-- Beskrivning -->
        <div class="form-group">

            <label>Beskrivning</label>

            <textarea placeholder="Beskriv checklistan...">
      </textarea>

        </div>

        <div class="form-group">

            <label>Bilaga</label>

            <label for="fileUpload" class="upload-box">

                <span class="material-symbols-outlined upload-icon">
                    cloud_upload
                </span>

                <p>Ladda upp bild eller PDF</p>

                <small>PNG, JPG eller PDF</small>

            </label>

            <input id="fileUpload" type="file" accept="image/*,.pdf" hidden />

        </div>

        <!-- Actions -->
        <div class="actions">

            <button class="cancel-btn" (click)="closeModal()">
                Avbryt
            </button>

            <button class="save-btn">
                Spara
            </button>

        </div>

    </div>

</div>
