<div class="kalender-kontainer">

  <!-- HEADER -->
  <div class="kalender-header">
    <button id="back-button" 
      class="back-button"
      (click)="previousMonth()">
    ←
          </button>
    
    <h1>{{ monthName }}</h1>
    <h2>{{ year }}</h2>
    
    <button id="forward-button" class="forward-button" (click)="nextMonth()">
      →
    </button>
      </div>

  <!-- Välj vilken kalender-vy som ska visas -->
  <div class="dropdownvy">
  <button type="button" class="dropbtn">
    @if (viewMode === 'month') {
      <span class="material-symbols-outlined">
  expand_more
</span>
      Visar månad 
    } @else if (viewMode === 'week') {
      <span class="material-symbols-outlined">
  expand_more
</span>
      Visar vecka 
    } @else {
      <span class="material-symbols-outlined">
  expand_more
</span>
      Visar dag 
    }
  </button>
<!-- Alternativen ändrar viewMode i kalender.ts -->
  <div class="dropdownvy-content">
    <button type="button" (click)="setViewMode('month')">Månad</button>
    <button type="button" (click)="setViewMode('week')">Vecka</button>
    <button type="button" (click)="setViewMode('day')">Dag</button>
  </div>
</div>




<!-- Visar endast en kalender-vy åt gången beroende på viewMode -->
@if (viewMode === 'month') {
  <app-month-view
    [veckodagar]="veckodagar"
    [weeks]="weeks"
    [todayDay]="todayDay"
    [getEventsForDay]="getEventsForDay.bind(this)"
    (stopResize)="stopResize()"
    (openDay)="openDay($event)"
    (openEvent)="openEvent($event)"
    (resizeEventToDay)="resizeEventToDay($event)"
    (handleDragOver)="handleDragOver($event)"
    (moveEventToDay)="moveEventToDay($event.dragEvent, $event.day)"
    (handleDayKeydown)="handleDayKeydown($event.event, $event.day)"
    (handleEventKeydown)="handleEventKeydown($event.event, $event.calendarEvent)"
    (handleDragStart)="handleDragStart($event.dragEvent, $event.calendarEvent)"
    (dragEnded)="draggedEventId = null"
    (startResize)="startResize($event.event, $event.calendarEvent)">
  </app-month-view>
} @else if (viewMode === 'week') { 
  <app-week-view
    [veckodagar]="veckodagar"
    [selectedWeek]="selectedWeek"
    [selectedWeekIndex]="selectedWeekIndex"
    [weeksLength]="weeks.length"
    [todayDay]="todayDay"
    [hours]="hours"
    [draggedEventId]="draggedEventId"
    [isTimeResizing]="resizingTimeEventId !== null"
    [getEventsForDay]="getEventsForDay.bind(this)"
    [getEventGridRow]="getEventGridRow.bind(this)"
    [getEventEndTime]="getEventEndTime.bind(this)"
    (previousWeek)="previousWeek()"
    (nextWeek)="nextWeek()"
    (stopResize)="stopResize()"
    (openDay)="openDay($event)"
    (openEvent)="openEvent($event)"
    (resizeEventToDay)="resizeEventToDay($event)"
    (resizeEventEndTime)="resizeEventEndTime($event)"
    (handleDragOver)="handleDragOver($event)"
    (moveEventToDay)="moveEventToDay($event.dragEvent, $event.day)"
    (handleDayKeydown)="handleDayKeydown($event.event, $event.day)"
    (handleEventKeydown)="handleEventKeydown($event.event, $event.calendarEvent)"
    (handleDragStart)="handleDragStart($event.dragEvent, $event.calendarEvent)"
    (dragEnded)="draggedEventId = null"
    (startResize)="startResize($event.event, $event.calendarEvent)"
    (startTimeResize)="startTimeResize($event.event, $event.calendarEvent)">
  </app-week-view>
} @else {
  <app-day-view
    [selectedDayForView]="selectedDayForView"
    [daysInCurrentMonth]="daysInCurrentMonth"
    [todayDay]="todayDay"
    [hours]="hours"
    [selectedDayForViewEvents]="selectedDayForViewEvents"
    [isTimeResizing]="resizingTimeEventId !== null"
    [getEventGridRow]="getEventGridRow.bind(this)"
    [getEventEndTime]="getEventEndTime.bind(this)"
    (previousDay)="previousDay()"
    (nextDay)="nextDay()"
    (stopResize)="stopResize()"
    (openDay)="openDay($event)"
    (openEvent)="openEvent($event)"
    (resizeEventToDay)="resizeEventToDay($event)"
    (resizeEventEndTime)="resizeEventEndTime($event)"
    (handleDragOver)="handleDragOver($event)"
    (moveEventToDay)="moveEventToDay($event.dragEvent, $event.day)"
    (handleDayKeydown)="handleDayKeydown($event.event, $event.day)"
    (handleEventKeydown)="handleEventKeydown($event.event, $event.calendarEvent)"
    (handleDragStart)="handleDragStart($event.dragEvent, $event.calendarEvent)"
    (dragEnded)="draggedEventId = null"
    (startTimeResize)="startTimeResize($event.event, $event.calendarEvent)">
  </app-day-view>
}

<!-- Modal för att skapa, visa, ändra och radera händelser -->
@if (selectedDay !== null) {
  <app-event-modal
    [selectedDay]="selectedDay"
    [selectedEvent]="selectedEvent"
    [showEventOverview]="showEventOverview"
    [(title)]="title"
    [(time)]="time"
    [(endTime)]="endTime"
    [(place)]="place"
    [(description)]="description"
    (close)="closeModal()"
    (save)="saveEvent()"
    (delete)="deleteEvent()"
    (edit)="showEventOverview = false">
  </app-event-modal>
}

</div>
