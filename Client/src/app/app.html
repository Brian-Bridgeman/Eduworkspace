<app-header></app-header>

<div class="layout">
    <app-sidebar (checklistClick)="showModal = true"> </app-sidebar>
    <section class="page">
        @for (checklist of checklists; track checklist.id) {
        <app-checklist-set-card [title]="checklist.title" [description]="checklist.description"
            [checklistExamples]="checklist.items">
        </app-checklist-set-card>
        }
        <router-outlet></router-outlet>
    </section>
    @if (showModal) {
    <app-checklist-modal (close)="showModal = false" (save)="addChecklist($event)">
    </app-checklist-modal>
    }
</div>
