<app-template-header title="Grupper" subtitle="Här ser du alla grupper." buttonText="Lägg till grupp"
    (searchChange)="searchTerm = $event" (buttonClick)="navigateToCreateGroup()">
</app-template-header>

<div class="tableDiv">
    <table>
        <thead>
            <tr>
                <th>Grupp</th>
                <th>Kurs</th>
                <th class="mobile-hidden">År</th>
                <th class="mobile-hidden">StartDatum</th>
                <th class="mobile-hidden">SlutDatum</th>
                <th class="mobile-hidden">Plats</th>
                <th class="mobile-hidden">Antal Elever</th>
                <th>Status</th>
                <th class="actions-column"></th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let grupp of filteredGroups" [routerLink]="['/groups', grupp.id]" class="clickable-row">
                <td class="avatar">
                    <span class="material-symbols-outlined">Folder</span>
                    <span>{{ grupp.namn }}</span>
                </td>
                <td>{{ grupp.kurs }}</td>
                <td class="mobile-hidden">{{ grupp.ar }}</td>
                <td class="mobile-hidden">{{ grupp.startdatum }}</td>
                <td class="mobile-hidden">{{ grupp.slutdatum }}</td>
                <td class="mobile-hidden">{{ grupp.plats }}</td>
                <td class="mobile-hidden">{{ grupp.antalElever }}</td>
                <td>{{ grupp.status }}</td>
                <td class="actions-column" (click)="$event.stopPropagation()"><app-dropdown-menu [item]="grupp"
                        (delete)="removeGroup($event)"></app-dropdown-menu>
                </td>
            </tr>
        </tbody>
    </table>
</div>
