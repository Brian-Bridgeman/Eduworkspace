<app-template-header title="Grupper" subtitle="Här ser du alla grupper." buttonText="Lägg till grupp" (searchChange)="searchTerm = $event" (buttonClick)="navigateToCreateGroup()">
</app-template-header>

<div class="tableDiv">
    <table>
        <thead>
            <tr>
                <th>Namn på grupp</th>
                <th>Kurs</th>
                <th>Grupp</th>
                <th>År</th>
                <th>StartDatum</th>
                <th>SlutDatum</th>
                <th>Plats</th>
                <th>Antal Elever</th>
                <th>Status</th>
                <th class="actions-column"></th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let grupp of filteredGroups">
                <td class="avatar">
                    <span class="material-symbols-outlined">Folder</span>
                    <span>{{ grupp.namn }}</span>
                </td>
                <td>{{ grupp.kurs }}</td>
                <td>{{ grupp.grupp }}</td>
                <td>{{ grupp.ar }}</td>
                <td>{{ grupp.startdatum }}</td>
                <td>{{ grupp.slutdatum }}</td>
                <td>{{ grupp.plats }}</td>
                <td>{{ grupp.antalElever }}</td>
                <td>{{ grupp.status }}</td>
                <td class="actions-column"><app-dropdown-menu></app-dropdown-menu></td>
            </tr>
        </tbody>
    </table>
</div>
