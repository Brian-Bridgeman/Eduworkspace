<app-template-header
  title="Kurser"
  subtitle="Här ser du alla kurser."
  buttonText="Lägg till kurs"
  (searchChange)="searchTerm.set($event)"
  (buttonClick)="openModal()">
</app-template-header>

<div class="courses-grid">
  @for (course of filteredCourses(); track course.id) {
    <div class="course-card" [routerLink]="['/courses', course.id]">
      <div class="card-header">
        <div class="header-content">
          <span class="material-symbols-outlined"> menu_book </span>
          <div class="header-text">
            <h2>{{ course.name }}</h2>
          </div>
        </div>
        <app-dropdown-menu
          (click)="$event.stopPropagation()"
          [item]="course"
         (delete)="removeCourse(+$event)"
        ></app-dropdown-menu>
      </div>
      <hr />
      <div class="card-body">
        <div class="info-row">
          <span class="label">Utbildare</span>
          <span> {{ course.educator }}</span>
        </div>
      </div>
    </div>
  }
</div>
@if (showModal()) {
  <app-create-course-modal (close)="showModal.set(false)" (save)="addCourse($event)">
  </app-create-course-modal>
}
