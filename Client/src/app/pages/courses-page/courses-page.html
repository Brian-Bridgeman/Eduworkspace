<app-template-header title="Kurser" subtitle="Här ser du alla kurser." buttonText="Lägg till kurs"
    (searchChange)="searchTerm = $event">
</app-template-header>

<div class="courses-grid">
    @for (course of filteredGroups; track course.id) {
    <div class="course-card">
        <h2> {{ course.name }} </h2>
    </div>
    }

</div>
