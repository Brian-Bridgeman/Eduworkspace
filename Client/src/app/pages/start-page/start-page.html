<div class="wrapper">
  <div class="header">
    <h1 class="title">Välkommen tillbaka, <span class="name">Johan!</span></h1>
    <p class="under-title">Här är en översikt av ditt utbildningssystem.</p>
  </div>

  <div class="container-wrapper">
    <app-start-page-card
      symbol="menu_book"
      title="Kurser"
      description="Hantera och skapa kurser samt se
      kursöversikt."
      type="kurser"
      viewText="Visa kurser >"
      createText="+ Lägg till kurs"
      page="courses"
      modalPage="createCourse"
    ></app-start-page-card>
    <app-start-page-card
      symbol="group"
      title="Deltagare"
      description="Se och hantera deltagare samt deras
      information."
      type="elever"
      viewText="Visa deltagare >"
      createText="+ Lägg till deltagare"
      page="students"
      modalPage="createStudent"
    ></app-start-page-card>
    <app-start-page-card
      symbol="groups"
      title="Grupper"
      description="Hantera grupper samt se deltagande elever."
      type="grupper"
      viewText="Visa grupper >"
      createText="+ Lägg till grupp"
      page="groups"
      modalPage="groups/create"
      createRoute="/groups/create"
    ></app-start-page-card>
    <app-start-page-card
      symbol="calendar_month"
      title="Kalender"
      description="Se scheman, planera och håll koll på viktiga datum."
      type="kalender"
      viewText="Visa kalender >"
      createText="+ Lägg till händelse"
      page="kalender"
      modalPage="createEvent"
    ></app-start-page-card>
  </div>
</div>
