<div class="student-details-page">

    <!-- TOP PROFILE CARD -->

    <div class="student-card">

        <!-- LEFT SIDE -->

        <div class="student-left">

            <img src="https://i.pravatar.cc/200" class="student-image" alt="Elevbild" />

            <div class="student-info">

                <div class="student-top">

                    <h1>Oscar Nilsson</h1>

                    <span class="status">
                        Aktiv
                    </span>

                </div>

                <div class="course-list">

                    <div class="course-item" *ngFor="let course of courses">

                        <span class="status-dot" [class.active-course]="course.active"
                            [class.inactive-course]="!course.active">
                        </span>

                        <span class="course-name">
                            {{ course.name }}
                        </span>

                    </div>

                </div>

                <div class="student-details">

                    <p>070-111 11 11</p>

                    <p>oscar@mail.com</p>

                    <p>Tech AB</p>

                </div>

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="student-right">

            <div class="student-meta">

                <div class="meta-item">
                    <span>Startdatum</span>
                    <p>2024-08-19</p>
                </div>

                <div class="meta-item">
                    <span>Kurs</span>
                    <p>Angular</p>
                </div>

                <div class="meta-item">
                    <span>Handledare</span>
                    <p>Johan Andersson</p>
                </div>

            </div>

            <button class="edit-btn">
                Redigera elev
            </button>

        </div>

    </div>

    <!-- TABS -->
    <div class="tabs">

        <button class="tab-button active">
            Översikt
        </button>

        <button class="tab-button">
            Anteckningar
        </button>

        <button class="tab-button">
            Checklistor
        </button>

        <button class="tab-button">
            Filer
        </button>

        <button class="tab-button">
            Närvaro
        </button>

    </div>

    <!-- MAIN CONTENT -->

    <div class="content-grid">

        <!-- LEFT COLUMN -->

        <div class="left-column">

            <!-- NOTES -->

            <div class="card notes-card">

                <div class="card-header">

                    <h2>Anteckningar</h2>

                    <button class="small-btn" (click)="openNoteModal()">

                        + Ny anteckning

                    </button>

                </div>

                <!-- NOTE COURSE TABS -->

                <div class="notes-scroll">

                    <button class="note-tab" *ngFor="let collection of noteCollections"
                        [class.active]="activeNoteCollection?.id === collection.id"
                        (click)="selectNoteCollection(collection)">

                        {{ collection.title }}

                    </button>

                </div>

                <!-- ACTIVE NOTES -->

                <div *ngIf="activeNoteCollection" class="active-notes">

                    <div class="note" *ngFor="let note of activeNoteCollection.notes">

                        <div class="note-top">

                            <p class="date">
                                {{ note.date }}
                            </p>

                            <button class="delete-note-btn" (click)="deleteNote(note)">

                                ✕

                            </button>

                        </div>

                        <p>
                            {{ note.text }}
                        </p>

                    </div>

                </div>

            </div>

        </div>

        <!-- RIGHT COLUMN -->

        <div class="right-column">

            <!-- CHECKLISTS -->

            <div class="card checklist-card">

                <div class="card-header">

                    <h2>Checklistor</h2>

                    <button class="card-link-btn" (click)="openChecklistModal()">

                        + Ny checklista

                    </button>

                </div>

                <!-- CHECKLIST COLLECTION -->

                <div class="checklist-scroll">

                    <button class="checklist-tab" *ngFor="let checklist of checklists"
                        [class.active]="activeChecklist?.id === checklist.id" (click)="selectChecklist(checklist)">

                        {{ checklist.title }}

                    </button>

                </div>

                <!-- ACTIVE CHECKLIST -->

                <div *ngIf="activeChecklist" class="active-checklist">

                    <h3 class="checklist-title">
                        {{ activeChecklist.title }}
                    </h3>

                    <label class="check-item" *ngFor="let item of activeChecklist.items">

                        <input type="checkbox" [checked]="item.completed"
                            (change)="toggleChecklistItem(activeChecklist, item)" />

                        <span>
                            {{ item.text }}
                        </span>

                    </label>

                </div>

            </div>

            <!-- FILES -->

            <div class="card">

                <div class="card-header">

                    <h2>Filer och bilder</h2>

                    <button class="card-link-btn">
                        Visa alla
                    </button>

                </div>

                <div class="images">

                    <img src="https://picsum.photos/200" alt="bild" />

                    <img src="https://picsum.photos/201" alt="bild" />

                    <img src="https://picsum.photos/202" alt="bild" />

                </div>

                <button class="upload-btn">
                    Ladda upp fil eller bild
                </button>

            </div>

        </div>

    </div>

</div>
<app-checklist-modal *ngIf="showChecklistModal" [studentId]="1" (close)="closeChecklistModal()">

</app-checklist-modal>
<div class="test-modal" *ngIf="showNoteModal">

    <div class="test-modal-content">

        <h2>Ny anteckning</h2>

        <textarea [(ngModel)]="newNoteText" placeholder="Skriv anteckning...">

        </textarea>

        <div class="modal-actions">

            <button (click)="closeNoteModal()">
                Avbryt
            </button>

            <button (click)="saveNote()">
                Spara
            </button>

        </div>

    </div>

</div>
