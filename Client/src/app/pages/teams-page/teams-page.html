<div class="page-header">
    <app-template-header title="H1 26" subtitle="Elinstallation · Sal B · 12 jan 2026 → 22 mar 2026"
        buttonText="Hantera arbetslag" (buttonClick)="navigateToEditTeamsPage()" (searchChange)="searchTerm = $event">
    </app-template-header>
</div>

<div class="tableDiv">
    <table>
        <thead>
            <tr>
                <th>Arbetslag</th>
                <th>Grupp</th>
                <th>Plats</th>
                <th>Deltagare</th>
                <th class="actions-column"></th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let team of filteredTeams" [routerLink]="['/groups', groupId, 'teams', team.id]"
                class="clickable-row">
                <td>{{ team.gruppNamn }}</td>
                <td>{{ team.grupp }}</td>
                <td>{{ team.plats }}</td>
                <td>{{ team.deltagare }}</td>
                <td class="actions-column" (click)="$event.stopPropagation()"><app-dropdown-menu [item]="team"
                        (delete)="removeTeam($event)"></app-dropdown-menu></td>
            </tr>
        </tbody>
    </table>
</div>

<app-overview-section></app-overview-section>
