<app-template-header title="Arbetslag" subtitle="Här ser du alla lagen." buttonText="Lägg till ett lag"
    (searchChange)="searchTerm = $event"></app-template-header>

<div class="tableDiv">
    <table>
        <thead>
            <tr>
                <th>Arbetslag</th>
                <th>Program</th>
                <th>Grupp</th>
                <th>Plats</th>
                <th>Deltagare</th>
                <th class="actions-column"></th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let team of filteredTeams" [routerLink]="['/groups', groupId, 'teams', team.id]" class="clickable-row">
                <td>{{ team.gruppNamn }}</td>
                <td>{{ team.kurs }}</td>
                <td>{{ team.grupp }}</td>
                <td>{{ team.plats }}</td>
                <td>{{ team.deltagare }}</td>
                 <td class="actions-column" (click)="$event.stopPropagation()"><app-dropdown-menu></app-dropdown-menu></td>
            </tr>
        </tbody>
    </table>
</div>
