<div class="course-wrapper">
    <div class="course-card">
        <div>
            <h2>C#</h2>

            <div class="info">
                <span>Utbildare:</span>
                <span>Oscar</span>
            </div>
        </div>
    </div>
    <div class="template-header">
        <hr>
        <app-template-header title="" subtitle=""
            buttonText="Lägg till kurstillfällen" (searchChange)="searchTerm = $event"
            (buttonClick)="navigateToCreateGroup()">
        </app-template-header>
    </div>
</div>

<div class="tableDiv">
    <table>
        <thead>
            <tr>
                <th>Grupp</th>
                <th>År</th>
                <th>StartDatum</th>
                <th>SlutDatum</th>
                <th>Plats</th>
                <th>Antal Elever</th>
                <th>Status</th>
                <th class="actions-column"></th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let grupp of filteredGroups" [routerLink]="['/groups', grupp.id]" class="clickable-row">
                <td class="avatar">
                    <span class="material-symbols-outlined">Folder</span>
                    <span>{{ grupp.namn }}</span>
                </td>
                <td>{{ grupp.ar }}</td>
                <td>{{ grupp.startdatum }}</td>
                <td>{{ grupp.slutdatum }}</td>
                <td>{{ grupp.plats }}</td>
                <td>{{ grupp.antalElever }}</td>
                <td>{{ grupp.status }}</td>
                <td class="actions-column" (click)="$event.stopPropagation()"><app-dropdown-menu></app-dropdown-menu>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<app-overview-section></app-overview-section>
