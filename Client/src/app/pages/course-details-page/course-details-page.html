<div class="page-header">
    <app-template-header [title]="courseName()" subtitle="Utbildare: Oscar" buttonText="Lägg till kurstillfällen"
        (searchChange)="searchTerm.set($event)" (buttonClick)="navigateToCreateGroup()">
    </app-template-header>
</div>

<div class="tableDiv">
    <table>
        <thead>
            <tr>
                <th>Grupp</th>
                <th class="mobile-hide">År</th>
                <th>StartDatum</th>
                <th>SlutDatum</th>
                <th>Plats</th>
                <th class="mobile-hide">Antal Elever</th>
                <th class="mobile-hide">Status</th>
                <th class="actions-column"></th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let grupp of filteredSessions()" [routerLink]="['/groups', grupp.id]" class="clickable-row">
                <td class="avatar">
                    <span class="material-symbols-outlined">groups</span>
                    <span>{{ grupp.name }}</span>
                </td>
                <td class="mobile-hide">{{grupp.startDate | date: 'yyyy'}}</td>
                <td>{{grupp.startDate | date: 'yyyy-MM-dd'}}</td>
                <td>{{grupp.endDate | date: 'yyyy-MM-dd'}}</td>
                <td>{{ grupp.location }}</td>
                <td class="mobile-hide"><!--{{ grupp.antalElever }}-->10</td>
                <td class="mobile-hide"><!--{{ grupp.status }}-->Pågående</td>
                <td class="actions-column">
                    <app-dropdown-menu (click)="$event.stopPropagation()" [item]="grupp"
                        (delete)="removeSession(+$event)">
                    </app-dropdown-menu>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<app-overview-section></app-overview-section>
