<app-template-header title="Elever" subtitle="Här ser du alla registrerade elever." buttonText="Lägg till elev" (searchChange)="searchTerm = $event"></app-template-header>

<div class="tableDiv">
    <table>
        <thead>
            <tr>
                <th>Namn</th>
                <th>Telefonnummer</th>
                <th>E-post</th>
                <th>Företag</th>
                <th>Kurs</th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let person of filteredPersons">
                <td class="avatar">
                    <span class="material-symbols-outlined">account_circle</span>
                    <span>{{ person.namn }}</span>
                </td>
                <td>{{ person.telefonNr }}</td>
                <td>{{ person.epost }}</td>
                <td>{{ person.foretag }}</td>
                <td>{{ person.kurs }}</td>
            </tr>
        </tbody>
    </table>
</div>
