<app-template-header
  title="Elever"
  subtitle="Här ser du alla registrerade elever."
  buttonText="Lägg till elev">
</app-template-header>

<div>
    <table class="a">
        <tr>
            <th>Namn</th>
            <th>TelefonNr</th>
            <th>Epost</th>
            <th>Företag</th>
            <th>Kurs</th>
        </tr>

        <tr *ngFor="let person of persons">
            <td>{{ person.namn }}</td>
            <td>{{ person.telefonNr }}</td>
            <td>{{ person.epost }}</td>
            <td>{{ person.foretag }}</td>
            <td>{{ person.kurs }}</td>
        </tr>
    </table>
</div>
