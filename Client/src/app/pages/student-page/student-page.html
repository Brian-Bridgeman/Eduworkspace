<app-template-header title="Deltagare" subtitle="Här ser du alla registrerade deltagare." buttonText="Lägg till deltagare" (searchChange)="searchTerm = $event" (buttonClick)="openModal()"></app-template-header>

<div class="tableDiv">
    <table>
        <thead>
            <tr>
                <th>Namn</th>
                <th>Telefonnummer</th>
                <th>E-post</th>
                <th>Företag</th>
                <th>Kurs</th>
                <th class="actions-column"></th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let person of filteredPersons" [routerLink]="['/students', person.id]" class="clickable-row">
                <td class="avatar">
                    <span class="material-symbols-outlined">account_circle</span>
                    <span>{{ person.namn }}</span>
                </td>
                <td>{{ person.telefonNr }}</td>
                <td>{{ person.epost }}</td>
                <td>{{ person.foretag }}</td>
                <td>{{ person.kurs }}</td>
                <td class="actions-column" (click)="$event.stopPropagation()"><app-dropdown-menu></app-dropdown-menu></td>
            </tr>
        </tbody>
    </table>
</div>
@if (showModal()) {
    <app-add-student-modal
        (close)="showModal.set(false)"
        (save)="addStudent($event)">
    </app-add-student-modal>
}
