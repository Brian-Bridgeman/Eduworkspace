<div class="login-page">
    <div class="login-card">

        <h1>Logga in</h1>

        <div class="form-group">
            <label for="username">
                Användarnamn eller e-post
            </label>

            <input id="username" [(ngModel)]="username" type="text" placeholder="Ange användarnamn eller e-post">
        </div>

        <div class="form-group">
            <label for="password">Lösenord
            </label>

            <input id="password" [(ngModel)]="password" type="password" placeholder="Lösenord">
        </div>

        <button class="login-btn" (click)="login()">
            Logga in
        </button>

        <div class="link-buttons">
            <button type="button" class="link-btn">
                Skapa konto
            </button>

            <button type="button" class="link-btn">
                Glömt lösenord
            </button>
        </div>
    </div>
</div>
