<div class="login-page">
    <div class="login-card">
        <h1>Logga in</h1>
        <div class="form-group">
            <label for="username">
                Användarnamn eller e-post</label>
            <input [(ngModel)]="username" type="text" placeholder="Ange användarnamn eller e-post">

            <label for="password">Lösenord</label>
            <input [(ngModel)]="password" type="password" placeholder="Lösenord">
        </div>

        <button (click)="login()">
            Logga in
        </button>

        <button type="button" class="link-btn">
            Skapa konto
        </button>

        <button type="button" class="link-btn">
            Glömt lösenord
        </button>



    </div>
</div>
