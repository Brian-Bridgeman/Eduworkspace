<div class="login-page">
    <div class="login-card">
        <h1>Logga in</h1>
        <div class="form-group">
            <label for="username">
                Användarnamn eller e-post</label>
            <input id="username" type="text" placeholder="Ange användarnamn eller e-post">

            <label for="password">Lösenord</label>
            <input id="password" type="password" placeholder="Lösenord">
        </div>




    </div>
</div>





<button (click)="login()">
    Logga in
</button>
